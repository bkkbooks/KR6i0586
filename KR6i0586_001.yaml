body:
  text: 藥王菩薩化理流布如是我聞爾時佛在兜率羅天頂摩尼珠耀如日照見娑婆世界衆生因緣天龍八部恭敬瞻仰藥王藥上二法王子即從坐起頂禮白佛言世尊衆生疾厄不等即如𤻼痘盛行世間或生胎中或在懷抱或五六歲以至長壯邪氣流染存沒哀苦以何因緣得此惡證佛言善哉善哉吾當為汝細説如是因緣唯摩尼珠是歷劫來諸佛之所凝結虗空直陽主持世界中有情無情皆被普照在人身中性水精明珠現其中如萬川月非一非多靈光道氣爰陰陽緣諸衆生無始劫來薰染真性加以欲氣粗濁精血交媾以故受生之後真妄搏擊清濁衡衡此性體中直摩尼珠既有清濁明暗諸相彼形骸裡幻摩尼珠遂有𤻼痘厚薄諸證一法子再白佛言佛性慈悲摩尼普照合得生理緣何沒故佛告王子真性不壞生生不減緣衆生心妄起善惡善氣輕清惡氣重濁輕清為陽重濁為陰陽清珠明性以制命仍居陽界陰濁珠暗命與性離仍還陰界非摩珠有明有暗而彼衆生自別明暗陰陽異路善惡異報𤻼痘存沒以是不齊藥王菩薩再起白佛頗有衆生現居陽界於𤻼痘時見諸惡鬼或男或女種種惡形提抱小兒或至水邊或以船載為何以故現諸形像佛言一氣氤氳如水鴻潒人處其中如魚遊水陰氣既多陰神隨之神離其舍而遊鴻潒如人捨宅而涉泛濫至修善人陽氣陽神見諸善形亦復如是彼命終人過奈河橋或有牛頭夜刃凶神或有蓮華幢幡吉相亦皆如是一切惟心更復何疑時藥王菩薩再白佛言嬰兒始孩有何惡業而得惡報又若善男信女將以何法而得消災願佛慈悲更為演説俾諸衆生堅固善念佛言善哉善哉汝能諸衆生求大饒益我今當説嬰孩何罪緣世界衆生生死輪回前世惡業其性陰濁神氣不清淨摩尼不照以致𤻼亡又或父母先人惡業相感陰陽相纏欠債殺生淫穢不淨致兒命不保死沈受河哀苦痛哭受其罪報曾不知𠎝服藥求醫怨天尤人有何益哉若有善男子善女人常存善心慈悲喜捨時持殺盜淫邪之戒便生端生有福之兒神靈氣清聰明智慧與摩尼珠渾合無二有何災疹能侵若有人於兒子𤻼痘時頓發善心自悔惡業父母齋戒不殺不淫香華耀燭晨夕頂禮持誦尊佛寶號及祕密神呪滿一千遍或五千四千餘遍即有佛聖降靈摩尼照耀天龍守護惡鬼逃亡孩兒保命父母延年是大饒益不可思議時二法王子歡喜踊躍稽首白佛若有人持誦佛號及神呪者我當分身遍至其處普埀救護俾得安寧於是佛對藥王藥上二大菩薩而説呪曰唵波羅蜜多唵悉達多般怛那南無毗婆尸佛南無尸棄佛南無毗舍浮佛南無拘留孫佛南無毗那含牟尼佛南無迦葉佛南無本師釋迦牟尼佛南無當來彌勒尊南無大慈大悲救苦救難靈感觀世音菩薩摩訶薩南無誓度衆生消災增壽藥王藥上菩薩摩訶薩唵波羅蜜多唵悉多般怛那藥王菩薩化珠保命真經序貴陽龍岡莊地近夷痘患為甚俗兒將痘則出之曠野不死然後持歸豫年過六旬兒女各一俱將痘從俗遠置兒于廢廟中有遊僧體貌甚奇持一小篋時出篋中類居草根嚙曰吾自樂此不飲酒行若大醉將跌狀呼曰急扶我骸時廟中置兒約十數僧遍視之伸兩指按諸兒面痘即應指所按處而發餘體皆無豫異之欲延歸視女僧曰家向何方指示之僧俯首吸泉水登高望所向噀之一方小兒痘皆稀如水珠象曾無一失後莫知所往惟留一像于廟壁中及痘疹復行爭抱兒置其所痘復多吉時有牧童從山中來熟視其像指謂衆曰此僧吾方遇之山中醉臥吾不敢近衆即隨牧童追尋無迹惟懸所持篋於石燈上因發篋而得是經遂祀其像持誦此經自是龍岡始知奉佛而災疹漸消得免痘患豫欲廣施此經以惠十方故備述所自云弟子刑敬拜書豫謫居貴陽多病寡歡日坐小軒撿方書及釋典始得是經閲之其妙義奧旨大與虗無之談異實余平生所未經見按方書諸病之生可以審證而治惟𤻼痘之種不見經傳上古未有間有附會之説終非的證治無明驗此經所言甚詳悉可信且痘之發也必焚香潔淨戒酒忌諸惡穢其機蓋與神通云細察遊僧所吉即藥王菩薩現世度厄其曰吾自樂此者藥也曰急扶我骸者急救嬰孩也乃謀之父老因其廢廟而寺之名其懸篋之石曰佛篋峰寺成二年而大興疾病禱者立應豫既名還携歸重刻此本而家藏之并為之序正德庚午陽明王守仁識凡持此經切須齋戒不殺不淫香燈華水或設佛像禮念或當空拜俑仍虔具果品齋供致祭行珠神甚驗或敦請僧道代誦亦可此貴陽相傳真訣萬曆己酉孟夏淨土弟子陳宗濠藍折蔡炳藍垔同梓觀世音菩薩稀痘感應塔號志心頂禮海中湧出普陀山觀音菩薩在其間三竿翠竹為伴侶一枝楊柳灑塵凡鸚鵡銜花來供養龍女獻寶百千𦨚腳蹈紅蓮千朵現手持淨水度群生大慈悲救苦難稀痘靈感觀世音菩薩唵阿盧勒繼娑婆訶請福迎祥消災錫慶計五千四千八拜右觀音菩薩稀痘寶塔素最靈應己亥年亨仲兒叔修方三歲十一月忽發熱家人飼以酒遂過熱三日痘見面通紅如橘皮狀見啼狂舞不止家人惶駭亨仲亦憂甚無可奈何因憶觀音稀痘之應乃具香燭牛家頂禮始插香于爐心默計以為必拜盡一炷香方起時兒啼甚蒸拜未及寸香兒啼遂止仲聞啼止未知消息竊計或藉靈應少差否則事且不測或毒墳內不能啼未可知也疑駭不可忍方拜及寸餘香即起燃紙燭照兒面紅點棊布肉見白地無復向時通紅之相兒且穩睡既而痘痬果保疹安靈庇非一當灌漿後一醫謂宜服人參二錢仲剪參在手偶轉身觸撒于地僮拾少許因再市參煎之方熟又為一僮誤觸火燼藥罐覆地仲悟遂不服參後遇一名醫謂曰此兒漿後更服參翻助火毒未可瘳也姑知觀音默祐之妙亨仲深荷洪慈莫繇酬報因書此晉勸流傳令保童之家禱之必獲靈應云萬曆己酉陽月吉旦閩王亨仲熏沐拜梓竺乾之書不經譯而傳於茲土者吾於此經始見焉新建所謂藥王菩薩現世度厄良有以也新建於儒可謂傑然者也尊信此經而刻之序也則世儒豈可異端而侮之哉況於奉佛者耶豫得此經而什襲珍藏也久矣藥王菩薩不待請而化現流布豫又憶古曰君子莫大乎善與人同是故附剞厥氏令廣其傳云寬文壬子夏至日杉室主人連山僧交易書文政五壬午年十二月十二日以稻野千手院靜快法印本書寫功了北斗山沙門秀陽六十四歲
